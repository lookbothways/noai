<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noai Search</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: 'Roboto', sans-serif;
            font-weight: 300;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            box-sizing: border-box;
        }

        input[type="text"] {
            width: 100%;
            font-family: 'Roboto', sans-serif;
            font-weight: 300;
            font-size: 1.5rem;
            padding: 20px 25px;
            border: 1px solid #ddd;
            border-radius: 10px; /* curved corner radius */
            outline: none;
            background: #fafafa;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #bbb;
            background: #ffffff;
        }

        #search-btn {
            background: transparent;
            border: none;
            font-family: 'Roboto', sans-serif;
            font-weight: 100;
            font-size: 3rem;
            color: #111;
            cursor: pointer;
            outline: none;
            text-align: center;
            padding: 0;
            transition: color 0.2s;
        }

        #search-btn:hover {
            color: #1a73e8; 
        }
    </style>
</head>
<body>

    <div id="container">
        <input type="text" id="search-field" placeholder="Search the web without AI..." autocomplete="off" autofocus>
        <button id="search-btn">search</button>
    </div>

    <script>
        const searchField = document.getElementById('search-field');
        const searchBtn = document.getElementById('search-btn');

        // The function that executes the search
        function performSearch() {
            const query = searchField.value.trim();
            if (query !== "") {
                // Formats the URL and adds the udm=14 parameter
                const searchUrl = `https://www.google.com/search?q=${encodeURIComponent(query)}&udm=14`;
                window.location.href = searchUrl;
            }
        }

        // Trigger search when clicking the button
        searchBtn.addEventListener('click', performSearch);

        // Trigger search when pressing "Enter" in the text box
        searchField.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                performSearch();
            }
        });
    </script>
</body>
</html>
